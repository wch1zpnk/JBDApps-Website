<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Play Galactic Swarm, a fast arcade shooter from JBDApps.">
    <title>Galactic Swarm</title>
    <link rel="canonical" href="https://jbdapps.com/games/">
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="./style.css?v=20260722-compact-auto-upgrade">
  </head>
  <body>
    <main class="shell">
      <section class="game-frame" aria-label="Galactic Swarm arcade game">
        <div class="hud" aria-live="polite">
          <div>
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">High</span>
            <strong id="highScore">0</strong>
          </div>
          <div>
            <span class="label">Wave</span>
            <strong id="wave">1</strong>
          </div>
          <div>
            <span class="label">Lives</span>
            <strong id="lives">3</strong>
          </div>
          <div>
            <span class="label">Combo</span>
            <strong id="combo">1x</strong>
          </div>
          <div>
            <span class="label">Power</span>
            <strong id="power">Ready</strong>
          </div>
        </div>

        <canvas id="game" width="960" height="720"></canvas>

        <div id="overlay" class="overlay">
          <div class="title">Galactic Swarm</div>
          <p id="message">Press Enter or tap Start to launch.</p>
          <div class="controls">
            <button id="startButton" type="button">Start</button>
            <button id="pauseButton" type="button">Pause</button>
          </div>
        </div>

        <div id="settingsPanel" class="settings-panel" hidden>
          <div class="settings-heading">Game Settings</div>
          <div class="settings-row">
            <label for="volumeControl">Effects</label>
            <input id="volumeControl" type="range" min="0" max="100" value="70">
          </div>
          <div class="settings-row">
            <label for="musicVolumeControl">Music</label>
            <input id="musicVolumeControl" type="range" min="0" max="100" value="42">
          </div>
          <div class="settings-row">
            <label for="difficultyControl">Difficulty</label>
            <select id="difficultyControl">
              <option value="training">Training</option>
              <option value="normal" selected>Normal</option>
              <option value="veteran">Veteran</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="fireKeyControl">Fire Key</label>
            <select id="fireKeyControl">
              <option value="Space" selected>Space</option>
              <option value="KeyZ">Z</option>
              <option value="KeyX">X</option>
            </select>
          </div>
          <div class="settings-row settings-check">
            <label for="reducedMotionControl">Less Motion</label>
            <input id="reducedMotionControl" type="checkbox">
          </div>
          <div class="settings-row settings-check">
            <label for="highContrastControl">High Contrast</label>
            <input id="highContrastControl" type="checkbox">
          </div>
          <div class="gamepad-line"><span id="gamepadStatus">Gamepad: not connected</span></div>
          <div class="stats-block">
            <div class="settings-heading">Pilot Record</div>
            <div id="statsSummary" class="stats-summary"></div>
            <div id="achievementsList" class="achievements-list"></div>
          </div>
        </div>

        <div class="touch-controls" aria-label="Touch controls">
          <div>
            <button id="touchLeft" type="button" aria-label="Move left">◀</button>
            <button id="touchRight" type="button" aria-label="Move right">▶</button>
          </div>
          <div>
            <button id="touchBomb" class="touch-bomb" type="button" aria-label="Use bomb">BOMB</button>
            <button id="touchFire" class="touch-fire" type="button" aria-label="Fire">FIRE</button>
          </div>
        </div>
      </section>

      <section class="control-strip" aria-label="Game controls">
        <div class="key-group" aria-hidden="true">
          <kbd>←</kbd><kbd>→</kbd><kbd>Space</kbd>
        </div>
        <button id="settingsButton" class="settings-toggle" type="button">Settings</button>
        <p>Move, fire, collect power-ups, press B for a bomb, survive boss waves.</p>
      </section>
    </main>

    <script src="./game.js?v=20260722-compact-auto-upgrade"></script>
  </body>
</html>
